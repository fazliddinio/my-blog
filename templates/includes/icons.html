{% comment %}SVG Icon macros — include and use via icon-* classes{% endcomment %}

{% comment %}Arrow Right{% endcomment %}
{% if icon == "arrow-right" %}
<svg width="{{ size|default:'18' }}" height="{{ size|default:'18' }}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
{% endif %}

{% if icon == "arrow-up-right" %}
<svg width="{{ size|default:'18' }}" height="{{ size|default:'18' }}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>
{% endif %}

{% if icon == "star" %}
<svg width="{{ size|default:'18' }}" height="{{ size|default:'18' }}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
{% endif %}

{% if icon == "check" %}
<svg width="{{ size|default:'18' }}" height="{{ size|default:'18' }}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
{% endif %}
