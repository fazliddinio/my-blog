{% extends "dashboard/base.html" %}

{% block title %}Now Page{% endblock %}
{% block topbar_title %}Now Page{% endblock %}
{% block topbar_actions %}<a href="{% url 'blog:now' %}" class="btn btn--ghost btn--sm" target="_blank">View →</a>{% endblock %}

{% block content %}
<div class="dash-card">
  <div class="dash-card__body">
    <form method="post" class="dash-form">
      {% csrf_token %}
      {% for field in form %}
      <div class="dash-form__group">
        <label class="dash-form__label">{{ field.label }}</label>
        {{ field }}
      </div>
      {% endfor %}
      <div class="dash-form__actions">
        <button type="submit" class="btn btn--primary">Save</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
