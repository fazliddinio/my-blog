{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — fazliddin.com</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
  <style>
    body { background: var(--neutral-50); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 40px; width: 100%; max-width: 400px; box-shadow: var(--shadow-lg); }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo span { font-family: var(--font-sans); font-weight: 600; font-size: 22px; letter-spacing: -0.02em; }
    .login-logo .dot { display: inline-block; width: 5px; height: 5px; border-radius: 999px; background: var(--accent-500); margin: 0 1px; transform: translateY(-1px); }
    .login-logo .tld { font-family: var(--font-mono); font-weight: 500; color: var(--fg-muted); }
    .login-title { font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 24px; color: var(--fg); }
    .login-error { background: var(--danger-50); color: var(--danger-500); border: 1px solid #fecaca; border-radius: var(--radius-sm); padding: 10px 14px; font-size: 14px; margin-bottom: 16px; }
    .login-form { display: grid; gap: 16px; }
    .login-form label { font-size: 14px; font-weight: 500; color: var(--fg); display: block; margin-bottom: 6px; }
    .login-form input { width: 100%; padding: 10px 14px; font-family: var(--font-sans); font-size: 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--fg); }
    .login-form input:focus { outline: 1px solid var(--accent); outline-offset: 1px; }
    .login-submit { width: 100%; height: 40px; background: var(--neutral-950); color: var(--bg); border: none; border-radius: var(--radius-sm); font-family: var(--font-sans); font-weight: 500; font-size: 14px; cursor: pointer; margin-top: 8px; }
    .login-submit:hover { background: var(--neutral-800); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <span>fazliddin<span class="dot"></span><span class="tld">com</span></span>
    </div>
    <div class="login-title">Sign in to dashboard</div>

    {% if messages %}
    {% for message in messages %}
    <div class="login-error">{{ message }}</div>
    {% endfor %}
    {% endif %}

    <form class="login-form" method="post" action="{% url 'dashboard:login' %}">
      {% csrf_token %}
      <div>
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus>
      </div>
      <div>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="login-submit">Sign in</button>
    </form>
  </div>
</body>
</html>
