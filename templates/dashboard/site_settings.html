{% extends "dashboard/base.html" %}

{% block title %}Site Settings{% endblock %}
{% block topbar_title %}Site Settings{% endblock %}

{% block content %}
<div class="dash-card">
  <div class="dash-card__body">
    <form method="post" class="dash-form">
      {% csrf_token %}
      {% for field in form %}
      <div class="dash-form__group">
        <label class="dash-form__label">{{ field.label }}</label>
        {{ field }}
        {% if field.help_text %}<div class="dash-form__help">{{ field.help_text }}</div>{% endif %}
      </div>
      {% endfor %}
      <div class="dash-form__actions">
        <button type="submit" class="btn btn--primary">Save settings</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
